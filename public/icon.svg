<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2636"/>
      <stop offset="1" stop-color="#0d121b"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#35496b"/>
      <stop offset="1" stop-color="#1f2c45"/>
    </linearGradient>
    <radialGradient id="gem" cx="0.5" cy="0.38" r="0.85">
      <stop offset="0" stop-color="#ffdcae"/>
      <stop offset="0.45" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#c2410c"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- hearth glow behind the tome -->
  <circle cx="260" cy="252" r="160" fill="#fb923c" opacity="0.07"/>
  <!-- page block peeking out on the right/bottom -->
  <rect x="152" y="128" width="238" height="266" rx="14" fill="#e9e2cf"/>
  <rect x="152" y="128" width="238" height="266" rx="14" fill="none" stroke="#c9bfa4" stroke-width="3"/>
  <!-- front cover -->
  <rect x="138" y="114" width="238" height="266" rx="14" fill="url(#cover)"/>
  <!-- frost trim inside the cover -->
  <rect x="154" y="130" width="206" height="234" rx="8" fill="none" stroke="#7dd3fc" stroke-opacity="0.55" stroke-width="4"/>
  <!-- spine -->
  <path d="M138 128 a14 14 0 0 1 14 -14 h22 v266 h-22 a14 14 0 0 1 -14 -14 Z" fill="#141d2c"/>
  <rect x="138" y="150" width="36" height="10" fill="#f0b429"/>
  <rect x="138" y="334" width="36" height="10" fill="#f0b429"/>
  <!-- snow rune circle -->
  <circle cx="273" cy="243" r="62" fill="none" stroke="#7dd3fc" stroke-width="6" opacity="0.92"/>
  <g stroke="#7dd3fc" stroke-width="6" stroke-linecap="round" opacity="0.92">
    <line x1="273" y1="193" x2="273" y2="293"/>
    <line x1="230" y1="218" x2="316" y2="268"/>
    <line x1="230" y1="268" x2="316" y2="218"/>
  </g>
  <!-- ember gem at the heart of the rune -->
  <circle cx="273" cy="243" r="27" fill="url(#gem)"/>
  <circle cx="273" cy="243" r="27" fill="none" stroke="#ffe3c2" stroke-width="3" opacity="0.85"/>
  <!-- gold clasp on the fore-edge -->
  <rect x="356" y="226" width="32" height="36" rx="7" fill="#f0b429"/>
  <rect x="366" y="235" width="13" height="18" rx="3" fill="#7c5200"/>
  <!-- ember bookmark ribbon -->
  <path d="M298 380 v56 l15 -13 l15 13 v-56 Z" fill="#fb923c"/>
  <!-- sparkles -->
  <path d="M118 92 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 Z" fill="#ffd166"/>
  <path d="M408 128 l4.5 12 12 4.5 -12 4.5 -4.5 12 -4.5 -12 -12 -4.5 12 -4.5 Z" fill="#9fe0ff"/>
  <path d="M402 380 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 Z" fill="#9fe0ff" opacity="0.9"/>
</svg>
